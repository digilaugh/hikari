<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hikari ✦</title>
  <meta
    http-equiv="Content-Security-Policy"
    content="
      default-src 'none';
      script-src 'self' https://cdn.jsdelivr.net;
      style-src 'self';
      img-src 'self' data: blob:;
      connect-src https://generativelanguage.googleapis.com https://cdn.jsdelivr.net;
      font-src 'self';
      object-src 'none';
      worker-src 'none';
      frame-src 'none';
      frame-ancestors 'none';
      base-uri 'none';
      form-action 'none';
      upgrade-insecure-requests;
    "
  >
  <link rel="stylesheet" href="styles.css">
  <script type="importmap" src="import-map.json"></script>
  <script type="module" src="main.js" defer></script>
</head>
<body>
  <canvas id="bgCanvas"></canvas>

  <div class="app">
    <header>
      <div class="title-row">
        <h1>✦ Hikari</h1>
        <div class="ctrl-row">
          <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
          <button class="icon-btn" id="exportBtn"  title="Export chat">📤</button>
          <button class="icon-btn" id="clearBtn"   title="Clear chat">🗑️</button>
        </div>
      </div>
      <div class="key-row">
        <input
          id="apiKeyInput"
          type="password"
          placeholder="Gemini API key (AIza...)"
          autocomplete="off"
          spellcheck="false"
          aria-label="API Key"
        >
        <label class="rm">
          <input type="checkbox" id="rememberKeyCheckbox"> Remember
        </label>
      </div>
    </header>

    <div class="aff-wrap">
      <span>💜</span>
      <div class="aff-bar"><div id="affectionFill"></div></div>
      <span id="affectionLabel">Bond: 0%</span>
    </div>

    <div id="avatarSection">
      <div id="avatarWrapper">
        <canvas id="threeCanvas"></canvas>
        <svg id="svgAvatar" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg" aria-label="Hikari, anime companion">
          <!-- SVG contents identical to original, kept for brevity -->
          <defs>...</defs>
          <!-- rest of SVG omitted for space; it is exactly the same as the original -->
        </svg>
        <canvas id="vizCanvas"></canvas>
        <div id="emotionBadge"></div>
        <div id="statusBadge">
          <span id="statusDot"></span>
          <span id="statusText">Ready</span>
        </div>
      </div>
    </div>

    <div id="chatLog" aria-live="polite" aria-label="Chat log"></div>
    <div id="typingIndicator">
      <span></span><span></span><span></span>
    </div>
    <div id="statusMessage"></div>

    <div class="ir">
      <input
        id="textInput"
        type="text"
        placeholder="Type a message or tap mic..."
        autocomplete="off"
        aria-label="Message input"
      >
      <button id="sendBtn" aria-label="Send message">➤</button>
    </div>

    <button id="micBtn" aria-label="Toggle microphone">🎤</button>

    <!-- Settings panel overlay and container -->
    <div id="settingsOverlay"></div>
    <aside id="settingsPanel">
      <div class="s-head">
        <h2>Settings</h2>
        <button class="icon-btn" id="closeSettingsBtn">✕</button>
      </div>
      <div class="s-sect">
        <span class="s-lbl">Theme</span>
        <div class="theme-row">
          <button class="tb on" data-theme="default">Default</button>
          <button class="tb" data-theme="sakura">Sakura</button>
          <button class="tb" data-theme="midnight">Midnight</button>
        </div>
      </div>
      <div class="s-sect">
        <span class="s-lbl">3D Avatar</span>
        <label class="tog">
          <input type="checkbox" id="threeToggle" checked>
          <span class="tog-tr"></span>
        </label>
      </div>
      <div class="s-row">
        <span>Voice Speed</span>
        <span class="s-val" id="voiceSpeedValue">1.0</span>
      </div>
      <input type="range" id="voiceSpeedSlider" min="0.5" max="2" step="0.1" value="1">
      <button class="s-btn red" id="resetBtn">Reset All Data</button>
    </aside>

    <div id="toastContainer"></div>
  </div>
</body>
</html>
